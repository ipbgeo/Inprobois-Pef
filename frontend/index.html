<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WebSIG Inprobois - Inventaire forestier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Feuille de style Leaflet (nécessaire pour l'affichage de la carte) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* La carte doit avoir une taille définie, sinon elle ne s'affiche pas */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100vh; /* prend toute la hauteur de l'écran */
    }
  </style>
</head>
<body>

  <!-- C'est ici que la carte va s'afficher -->
  <div id="map"></div>

  <!-- Bibliothèque JavaScript Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Notre propre code JavaScript -->
  <script src="app.js"></script>

</body>
</html>
